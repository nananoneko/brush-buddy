<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BrushBuddy - 刷牙监督</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FEF6E4;
  --card: #fffdf7;
  --primary: #F582AE;
  --accent: #8BD3DD;
  --success: #A8D5BA;
  --warning: #FFD166;
  --danger: #EF6351;
  --text: #4A3728;
  --text-dim: #B08968;
  --shadow: rgba(180,140,100,0.12);
  --border: rgba(180,140,100,0.10);
  --pink-soft: #FFDDE1;
  --mint-soft: #C5F0E0;
  --yellow-soft: #FFF3C4;
}

body {
  font-family: 'ZCOOL KuaiLe', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 85%, rgba(245,130,174,0.10) 0%, transparent 40%),
    radial-gradient(circle at 85% 15%, rgba(139,211,221,0.10) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,209,102,0.06) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Decorative floating elements */
body::before {
  content: '✿ ⋆ ˚ ✧ ˚ ✿ ⋆ ˚ ✧ ˚ ✿';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(245,130,174,0.15);
  letter-spacing: 12px;
  pointer-events: none;
  z-index: 0;
  padding: 4px;
}

/* Navigation */
.nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 12px 10px;
  background: linear-gradient(180deg, #fffdf7 0%, #fef6e4 100%);
  border-bottom: 2px dashed rgba(245,130,174,0.2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav button {
  background: var(--card);
  border: 2px dashed rgba(180,140,100,0.15);
  color: var(--text-dim);
  padding: 8px 20px;
  border-radius: 24px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.3s;
}
.nav button:active { transform: scale(0.95); }
.nav button.active {
  background: linear-gradient(135deg, var(--primary), #F8A4C0);
  color: #fff;
  border: 2px solid transparent;
  box-shadow: 0 3px 12px rgba(245,130,174,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

/* Pages */
.page { display: none; padding: 16px; max-width: 420px; margin: 0 auto; position: relative; z-index: 1; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

/* Timer Page */
.timer-page { text-align: center; }

.tooth-container {
  position: relative;
  width: 120px;
  height: 144px;
  margin: 8px auto;
}

.tooth-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1));
  transition: filter 0.5s;
}

.tooth-face {
  transition: all 0.3s;
}

/* Zone indicator */
.zone-map {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin: 8px auto;
  max-width: 340px;
}
.zone-cell {
  padding: 10px 6px;
  border-radius: 16px;
  background: var(--card);
  border: 2px dashed var(--border);
  box-shadow: 0 3px 10px var(--shadow);
  font-size: 12px;
  transition: all 0.4s;
  position: relative;
  overflow: hidden;
}
.zone-cell.active {
  border-color: var(--primary);
  border-style: solid;
  background: linear-gradient(135deg, rgba(245,130,174,0.08), rgba(248,164,192,0.12));
  box-shadow: 0 3px 14px rgba(245,130,174,0.25);
}
.zone-cell.done {
  border-color: var(--success);
  border-style: solid;
  background: linear-gradient(135deg, rgba(168,213,186,0.12), rgba(168,213,186,0.18));
}
.zone-cell .zone-name { font-weight: 600; margin-bottom: 2px; }
.zone-cell .zone-time { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.zone-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: var(--primary);
  transition: width 0.1s linear;
}
.zone-cell.done .zone-progress { background: var(--success); }

/* Main timer */
.main-timer {
  font-size: 52px;
  font-weight: 700;
  letter-spacing: 4px;
  margin: 8px 0;
  font-variant-numeric: tabular-nums;
  color: var(--primary);
  text-shadow: 0 2px 8px rgba(245,130,174,0.2);
}

.timer-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

/* Controls */
.controls {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 10px 0;
}
.btn {
  border: none;
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 16px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
}
.btn:active { transform: scale(0.95); }
.btn-start {
  background: linear-gradient(135deg, #F582AE, #F8A4C0, #FFDDE1);
  color: #fff;
  box-shadow: 0 4px 18px rgba(245,130,174,0.35), inset 0 2px 0 rgba(255,255,255,0.3);
  text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}
.btn-start:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(245,130,174,0.45); }
.btn-pause {
  background: linear-gradient(135deg, var(--yellow-soft), #FFE79E);
  color: #A67C00;
  border: 2px dashed #FFD166;
}
.btn-stop {
  background: linear-gradient(135deg, #FFE0DD, #FECEC8);
  color: var(--danger);
  border: 2px dashed var(--danger);
}
.btn-small {
  background: var(--card);
  color: var(--text-dim);
  padding: 10px 20px;
  font-size: 13px;
  box-shadow: 0 3px 10px var(--shadow);
  border: 2px dashed var(--border);
}

/* Music selector */
.order-toggle {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin: 10px 0 4px;
}
.order-btn {
  background: var(--card);
  border: 2px dashed var(--border);
  color: var(--text-dim);
  padding: 7px 18px;
  border-radius: 18px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 2px 6px var(--shadow);
  transition: all 0.3s;
}
.order-btn:active { transform: scale(0.95); }
.order-btn.active {
  background: linear-gradient(135deg, rgba(139,211,221,0.15), rgba(197,240,224,0.2));
  color: #5BA69A;
  border: 2px solid var(--accent);
}
.music-selector {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 8px 0;
  flex-wrap: wrap;
}
.music-btn {
  background: var(--card);
  border: 1.5px dashed var(--border);
  color: var(--text-dim);
  padding: 6px 12px;
  border-radius: 18px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.3s;
  box-shadow: 0 2px 6px var(--shadow);
}
.music-btn:active { transform: scale(0.93); }
.music-btn.active {
  background: linear-gradient(135deg, rgba(139,211,221,0.18), rgba(197,240,224,0.22));
  border: 1.5px solid var(--accent);
  color: #4A9A8E;
  box-shadow: 0 2px 8px rgba(139,211,221,0.25);
}

/* Volume control */
.volume-control {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 4px 0;
}
.volume-control input[type="range"] {
  width: 110px;
  accent-color: var(--primary);
  border-radius: 8px;
}
.volume-label { font-size: 12px; color: var(--text-dim); }

/* Completion screen */
.completion {
  display: none;
  text-align: center;
  padding: 40px 20px;
  animation: fadeIn 0.5s;
}
.completion.show { display: block; }
.completion h2 {
  font-size: 28px;
  margin: 20px 0 8px;
  color: var(--primary);
  text-shadow: 0 2px 6px rgba(245,130,174,0.2);
}
.completion p { color: var(--text-dim); margin: 8px 0; }
.streak-display {
  font-size: 52px;
  font-weight: 700;
  margin: 16px 0;
  color: var(--warning);
  text-shadow: 0 2px 8px rgba(255,209,102,0.3);
}

/* Calendar Page */
.calendar-page h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 400;
  color: var(--primary);
}
.cal-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.cal-nav button {
  background: var(--card);
  border: 2px dashed var(--border);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 16px;
  cursor: pointer;
  font-family: inherit;
  box-shadow: 0 2px 6px var(--shadow);
  transition: all 0.2s;
}
.cal-nav button:active { transform: scale(0.95); }
.cal-nav span { font-size: 16px; font-weight: 500; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-header {
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  padding: 8px 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  font-size: 13px;
  position: relative;
}
.cal-day.empty { background: transparent; }
.cal-day.checked {
  background: linear-gradient(135deg, rgba(168,213,186,0.25), rgba(197,240,224,0.3));
  color: #3D8B5E;
  font-weight: 600;
  border-radius: 50%;
}
.cal-day.checked::after {
  content: '✓';
  position: absolute;
  bottom: 2px;
  font-size: 8px;
  color: var(--success);
}
.cal-day.today {
  border: 2px dashed var(--primary);
  border-radius: 50%;
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-top: 24px;
}
.stat-card {
  background: var(--card);
  border-radius: 20px;
  padding: 16px 12px;
  text-align: center;
  box-shadow: 0 3px 12px var(--shadow);
  border: 2px dashed var(--border);
}
.stat-card:nth-child(1) { border-color: rgba(245,130,174,0.2); }
.stat-card:nth-child(2) { border-color: rgba(139,211,221,0.2); }
.stat-card:nth-child(3) { border-color: rgba(255,209,102,0.2); }
.stat-value {
  font-size: 30px;
  font-weight: 700;
  color: var(--primary);
}
.stat-card:nth-child(2) .stat-value { color: #5BA69A; }
.stat-card:nth-child(3) .stat-value { color: #D4A030; }
.stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Character Page */
.character-page { text-align: center; }
.char-display {
  margin: 30px auto;
  position: relative;
}
.char-name {
  font-size: 24px;
  font-weight: 600;
  margin: 16px 0 4px;
}
.char-title {
  font-size: 14px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.char-stats {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  margin: 16px 0;
  box-shadow: 0 3px 12px var(--shadow);
  border: 2px dashed rgba(245,130,174,0.15);
}
.char-stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
}
.char-stat-bar {
  flex: 1;
  height: 8px;
  background: rgba(0,0,0,0.06);
  border-radius: 4px;
  margin-left: 12px;
  overflow: hidden;
}
.char-stat-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.8s ease;
}
.level-badge {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  margin-top: 12px;
  border: 2px dashed rgba(245,130,174,0.2);
}
.btn-level-guide {
  margin-top: 16px;
  padding: 10px 28px;
  border-radius: 24px;
  border: 2px dashed var(--border);
  background: var(--card);
  color: var(--text-dim);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 3px 10px var(--shadow);
  transition: all 0.3s;
}
.btn-level-guide:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.btn-level-guide:active { transform: scale(0.95); }
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.35);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s ease;
}
.modal-content {
  background: var(--card);
  border-radius: 24px;
  border: 2px dashed rgba(245,130,174,0.2);
  width: 100%;
  max-width: 400px;
  max-height: 85vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(180,140,100,0.2);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h3 {
  margin: 0;
  font-size: 16px;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
}
.modal-body {
  overflow-y: auto;
  padding: 12px 16px 20px;
}
.level-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 16px;
  margin-bottom: 8px;
  background: rgba(254,246,228,0.5);
  border: 1.5px dashed transparent;
}
.level-card.current {
  background: linear-gradient(135deg, rgba(245,130,174,0.08), rgba(255,221,225,0.15));
  border-color: rgba(245,130,174,0.3);
  border-style: solid;
}
.level-card.locked {
  opacity: 0.35;
}
.level-card-preview {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.level-card-info {
  flex: 1;
  min-width: 0;
}
.level-card-name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 2px;
}
.level-card-title {
  font-size: 12px;
  color: var(--text-dim);
}
.level-card-req {
  font-size: 11px;
  margin-top: 4px;
  padding: 2px 8px;
  border-radius: 8px;
  display: inline-block;
}
.level-card-req.done { background: rgba(129,199,132,0.15); color: #4CAF50; }
.level-card-req.current { background: rgba(255,138,158,0.15); color: var(--primary); }
.level-card-req.locked { background: rgba(0,0,0,0.04); color: var(--text-dim); }
.level-check {
  font-size: 16px;
  flex-shrink: 0;
}

/* Tooth effects */
.tooth-glow {
  animation: toothGlow 2s ease-in-out infinite;
}
@keyframes toothGlow {
  0%, 100% { filter: drop-shadow(0 0 6px rgba(255,255,255,0.3)); }
  50% { filter: drop-shadow(0 0 16px rgba(255,255,255,0.8)); }
}
.sparkle-star {
  animation: sparkleBlink 2s ease-in-out infinite;
}
.halo-glow {
  animation: haloPulse 3s ease-in-out infinite;
}
@keyframes haloPulse {
  0%, 100% { opacity: 0.6; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-2px); }
}
.crown-shine {
  animation: crownShine 4s ease-in-out infinite;
}
@keyframes crownShine {
  0%, 100% { filter: drop-shadow(0 0 2px rgba(255,215,0,0.3)); }
  50% { filter: drop-shadow(0 0 8px rgba(255,215,0,0.8)); }
}
.wings-float {
  animation: wingsFloat 3s ease-in-out infinite;
}
@keyframes wingsFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}
@keyframes sparkleBlink {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 1; }
}
.tooth-diamond {
  animation: diamondShine 3s ease-in-out infinite;
}
@keyframes diamondShine {
  0%, 100% { filter: drop-shadow(0 0 4px rgba(156,39,176,0.3)) drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
  33% { filter: drop-shadow(0 0 12px rgba(156,39,176,0.6)) drop-shadow(0 0 20px rgba(255,255,255,0.5)); }
  66% { filter: drop-shadow(0 0 8px rgba(79,195,247,0.5)) drop-shadow(0 0 16px rgba(255,255,255,0.4)); }
}
.tooth-rainbow {
  animation: rainbowPulse 2s ease-in-out infinite;
}
@keyframes rainbowPulse {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(255,107,107,0.4)); }
  25% { filter: drop-shadow(0 0 12px rgba(255,217,61,0.5)); }
  50% { filter: drop-shadow(0 0 14px rgba(107,203,119,0.5)); }
  75% { filter: drop-shadow(0 0 12px rgba(77,150,255,0.5)); }
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}
@keyframes sparkle {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
.brushing .tooth-svg { animation: pulse 1s infinite; }

/* Sparkles */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--warning);
  border-radius: 50%;
  animation: sparkle 0.8s infinite;
  pointer-events: none;
}

/* Responsive */
@media (max-width: 380px) {
  .main-timer { font-size: 40px; }
  .zone-cell { padding: 6px 2px; }
  .tooth-container { width: 100px; height: 120px; }
}

/* Auth UI */
.auth-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
  color: var(--text-dim);
}
.auth-bar .user-name {
  color: var(--primary);
  font-weight: 500;
}
.auth-bar .user-avatar {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  vertical-align: middle;
}
.auth-btn {
  background: linear-gradient(135deg, rgba(245,130,174,0.1), rgba(255,221,225,0.2));
  border: 1.5px dashed rgba(245,130,174,0.3);
  color: var(--primary);
  padding: 5px 14px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all 0.3s;
}
.auth-btn:hover {
  background: linear-gradient(135deg, rgba(245,130,174,0.2), rgba(255,221,225,0.3));
  border-style: solid;
}
.auth-btn:active { transform: scale(0.95); }
.sync-status {
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0.6;
}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<nav class="nav">
  <button class="active" onclick="showPage('timer')">🪥 刷牙</button>
  <button onclick="showPage('calendar')">📅 打卡</button>
  <button onclick="showPage('character')">🦷 牙宝</button>
</nav>

<div class="auth-bar" id="authBar">
  <span id="authContent">
    <button class="auth-btn" onclick="googleLogin()">Google 登录 · 同步数据</button>
  </span>
</div>

<!-- Timer Page -->
<div id="page-timer" class="page timer-page active">
  <div class="tooth-container" id="toothContainer">
    <svg class="tooth-svg" id="toothSvg" viewBox="0 0 200 240">
      <!-- Tooth body -->
      <path d="M60 80 Q60 30 100 30 Q140 30 140 80 L145 120 Q145 140 135 160 L125 200 Q120 220 110 220 Q105 215 100 200 Q95 215 90 220 Q80 220 75 200 L65 160 Q55 140 55 120 Z"
            fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2" id="toothBody"/>
      <!-- Zone highlights -->
      <path d="M70 60 Q70 35 100 35 Q100 80 70 80 Z" fill="transparent" id="zone-ul" opacity="0.4"/>
      <path d="M100 35 Q130 35 130 60 L130 80 Q100 80 100 35 Z" fill="transparent" id="zone-ur" opacity="0.4"/>
      <path d="M55 90 Q55 70 65 60 L70 80 L65 120 Q55 110 55 90 Z" fill="transparent" id="zone-out" opacity="0.4"/>
      <path d="M65 100 Q65 80 100 80 L100 140 Q65 140 65 100 Z" fill="transparent" id="zone-ll" opacity="0.4"/>
      <path d="M100 80 Q135 80 135 100 L135 140 Q100 140 100 80 Z" fill="transparent" id="zone-lr" opacity="0.4"/>
      <path d="M135 90 Q145 70 145 90 L145 120 Q145 140 135 120 L130 80 Q135 70 135 90 Z" fill="transparent" id="zone-in" opacity="0.4"/>
      <!-- Face -->

<script>
// ============ DATA ============
const ZONE_NAMES = ['左上', '右上', '外侧', '左下', '右下', '内侧'];
const ZONE_IDS = ['zone-ul', 'zone-ur', 'zone-out', 'zone-ll', 'zone-lr', 'zone-in'];
const ZONE_SECONDS = 20;
const ZONE_GAP = 2; // seconds between zones
const TOTAL_SECONDS = ZONE_SECONDS * 6 + ZONE_GAP * 5;

let zoneOrder = 'seq'; // 'seq' or 'random'
let zoneSequence = [0, 1, 2, 3, 4, 5]; // current zone order

function setZoneOrder(mode) {
  zoneOrder = mode;
  document.getElementById('orderSeq').classList.toggle('active', mode === 'seq');
  document.getElementById('orderRand').classList.toggle('active', mode === 'random');
}

let state = {
  running: false,
  currentZone: 0,
  zoneTimeLeft: ZONE_SECONDS,
  totalTimeLeft: TOTAL_SECONDS,
  interval: null,
  audioCtx: null,
  musicType: 'funk',
  volume: 0.5,
  musicNodes: [],
  musicGain: null,
  musicLoopCount: 0,
  musicStartTime: 0,
  musicQueue: [],
  musicQueueIdx: 0,
};

// ============ FIREBASE ============
const firebaseConfig = {
  // TODO: 请填入你的 Firebase 配置
  apiKey: "",
  authDomain: "",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
};

let db = null;
let currentUser = null;

function initFirebase() {
  if (!firebaseConfig.apiKey) return; // Skip if not configured
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebase.auth().onAuthStateChanged(user => {
      currentUser = user;
      updateAuthUI();
      if (user) syncFromCloud();
    });
  } catch(e) {
    console.warn('Firebase init failed:', e);
  }
}

function updateAuthUI() {
  const bar = document.getElementById('authContent');
  if (!firebaseConfig.apiKey) {
    bar.innerHTML = '<span class="sync-status">本地存储模式</span>';
    return;
  }
  if (currentUser) {
    const photo = currentUser.photoURL ? `<img class="user-avatar" src="${currentUser.photoURL}" alt="">` : '';
    bar.innerHTML = `${photo} <span class="user-name">${currentUser.displayName || '已登录'}</span> <span class="sync-status" id="syncStatus">已同步</span> <button class="auth-btn" onclick="googleLogout()">退出</button>`;
  } else {
    bar.innerHTML = '<button class="auth-btn" onclick="googleLogin()">Google 登录 · 同步数据</button>';
  }
}

function googleLogin() {
  if (!firebaseConfig.apiKey) { alert('请先配置 Firebase（见源码中 firebaseConfig）'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider).catch(e => {
    console.error('Login failed:', e);
    alert('登录失败: ' + e.message);
  });
}

function googleLogout() {
  firebase.auth().signOut();
}

async function syncToCloud() {
  if (!currentUser || !db) return;
  try {
    const records = JSON.parse(localStorage.getItem('brush_records') || '[]');
    await db.collection('users').doc(currentUser.uid).set({
      records: records,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    const el = document.getElementById('syncStatus');
    if (el) el.textContent = '已同步';
  } catch(e) {
    console.warn('Sync to cloud failed:', e);
  }
}

async function syncFromCloud() {
  if (!currentUser || !db) return;
  try {
    const doc = await db.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      const cloudRecords = doc.data().records || [];
      const localRecords = JSON.parse(localStorage.getItem('brush_records') || '[]');
      // Merge: union of both record sets
      const merged = [...new Set([...localRecords, ...cloudRecords])].sort();
      localStorage.setItem('brush_records', JSON.stringify(merged));
      // Push merged back to cloud
      await db.collection('users').doc(currentUser.uid).set({
        records: merged,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      const el = document.getElementById('syncStatus');
      if (el) el.textContent = '已同步';
    } else {
      // First time: upload local data
      await syncToCloud();
    }
    // Refresh UI
    if (document.getElementById('page-calendar').classList.contains('active')) renderCalendar();
    if (document.getElementById('page-character').classList.contains('active')) updateCharacter();
  } catch(e) {
    console.warn('Sync from cloud failed:', e);
  }
}

// ============ STORAGE ============
function getRecords() {
  return JSON.parse(localStorage.getItem('brush_records') || '[]');
}
function saveRecord(date) {
  const records = getRecords();
  if (!records.includes(date)) {
    records.push(date);
    localStorage.setItem('brush_records', JSON.stringify(records));
    syncToCloud(); // Auto-sync to cloud after saving
  }
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getStreak() {
  const records = getRecords().sort();
  if (records.length === 0) return 0;
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  let checkDate = new Date(today);
  // If today not checked, start from yesterday
  if (!records.includes(todayStr())) {
    checkDate.setDate(checkDate.getDate() - 1);
  }
  while (true) {
    const ds = `${checkDate.getFullYear()}-${String(checkDate.getMonth()+1).padStart(2,'0')}-${String(checkDate.getDate()).padStart(2,'0')}`;
    if (records.includes(ds)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// ============ AUDIO ============
function initAudio() {
  if (!state.audioCtx) {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (state.audioCtx.state === 'suspended') {
    state.audioCtx.resume();
  }
}

// Master gain node for music - disconnect to instantly silence all music
function createMusicBus() {
  if (state.musicGain) {
    try { state.musicGain.disconnect(); } catch(e) {}
  }
  state.musicGain = state.audioCtx.createGain();
  state.musicGain.gain.value = 1;
  state.musicGain.connect(state.audioCtx.destination);
  return state.musicGain;
}
function getMusicDest() {
  return state.musicGain || state.audioCtx.destination;
}

function playBeep(freq, duration, type = 'sine') {
  if (!state.audioCtx) return;
  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(state.volume * 0.3, state.audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(state.audioCtx.destination);
  osc.start();
  osc.stop(state.audioCtx.currentTime + duration);
}

function playZoneSwitch() {
  playBeep(880, 0.15, 'sine');
  setTimeout(() => playBeep(1100, 0.15, 'sine'), 100);
  setTimeout(() => playBeep(1320, 0.2, 'sine'), 200);
}

let bestVoice = null;
function initVoice() {
  const voices = speechSynthesis.getVoices();
  // Prefer natural/premium voices, female voices tend to sound warmer
  const preferred = ['ting-ting', 'sinji', 'meijia', 'lili', 'google', 'hanhan', 'yafang', 'microsoft'];
  for (const pref of preferred) {
    const v = voices.find(v => v.lang.startsWith('zh') && v.name.toLowerCase().includes(pref));
    if (v) { bestVoice = v; return; }
  }
  // Prefer female/natural sounding: pick one with 'female' or 'natural' in name
  const natural = voices.find(v => v.lang.startsWith('zh') && /female|natural|enhanced/i.test(v.name));
  if (natural) { bestVoice = natural; return; }
  bestVoice = voices.find(v => v.lang.startsWith('zh')) || null;
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = initVoice;
  initVoice();
}

function speakZone(text) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'zh-CN';
  if (bestVoice) msg.voice = bestVoice;
  msg.rate = 1.0;
  msg.pitch = 1.2;
  msg.volume = Math.min(state.volume * 2, 1);
  speechSynthesis.speak(msg);
}

function playComplete() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => {
    setTimeout(() => playBeep(n, 0.3, 'sine'), i * 150);
  });
}

function playTick() {
  if (!state.audioCtx) return;
  const osc = state.audioCtx.createOscillator();
  const gain = state.audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 1000;
  gain.gain.setValueAtTime(state.volume * 0.05, state.audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, state.audioCtx.currentTime + 0.05);
  osc.connect(gain);
  gain.connect(state.audioCtx.destination);
  osc.start();
  osc.stop(state.audioCtx.currentTime + 0.05);
}

// ============ DRUM & MUSIC ENGINE ============
function createNoiseBuffer(duration) {
  const sr = state.audioCtx.sampleRate;
  const buf = state.audioCtx.createBuffer(1, sr * duration, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function playDrum(type, time, vol) {
  const ctx = state.audioCtx;
  const v = vol * state.volume;
  if (type === 'kick') {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(30, time + 0.12);
    g.gain.setValueAtTime(v * 0.6, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
    osc.connect(g); g.connect(getMusicDest());
    osc.start(time); osc.stop(time + 0.25);
  } else if (type === 'snare') {
    // Noise burst
    const noise = ctx.createBufferSource();
    noise.buffer = createNoiseBuffer(0.15);
    const nf = ctx.createBiquadFilter();
    nf.type = 'highpass'; nf.frequency.value = 1500;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(v * 0.35, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    noise.connect(nf); nf.connect(ng); ng.connect(getMusicDest());
    noise.start(time); noise.stop(time + 0.15);
    // Body tone
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, time);
    osc.frequency.exponentialRampToValueAtTime(120, time + 0.05);
    g.gain.setValueAtTime(v * 0.3, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
    osc.connect(g); g.connect(getMusicDest());
    osc.start(time); osc.stop(time + 0.1);
  } else if (type === 'hihat') {
    const noise = ctx.createBufferSource();
    noise.buffer = createNoiseBuffer(0.06);
    const f = ctx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 7000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(v * 0.2, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
    noise.connect(f); f.connect(g); g.connect(getMusicDest());
    noise.start(time); noise.stop(time + 0.06);
  } else if (type === 'openhat') {
    const noise = ctx.createBufferSource();
    noise.buffer = createNoiseBuffer(0.2);
    const f = ctx.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 6000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(v * 0.2, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    noise.connect(f); f.connect(g); g.connect(getMusicDest());
    noise.start(time); noise.stop(time + 0.2);
  } else if (type === 'clap') {
    for (let i = 0; i < 3; i++) {
      const noise = ctx.createBufferSource();
      noise.buffer = createNoiseBuffer(0.04);
      const f = ctx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 3;
      const g = ctx.createGain();
      const t = time + i * 0.012;
      g.gain.setValueAtTime(v * 0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      noise.connect(f); f.connect(g); g.connect(getMusicDest());
      noise.start(t); noise.stop(t + 0.1);
    }
  }
}

function playSynth(freq, time, dur, type, vol, detune) {
  const ctx = state.audioCtx;
  const v = vol * state.volume;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type || 'sawtooth';
  osc.frequency.setValueAtTime(freq, time);
  if (detune) osc.detune.value = detune;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(2000, time);
  f.frequency.exponentialRampToValueAtTime(400, time + dur * 0.8);
  f.Q.value = 5;
  g.gain.setValueAtTime(v * 0.15, time);
  g.gain.setValueAtTime(v * 0.15, time + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.95);
  osc.connect(f); f.connect(g); g.connect(getMusicDest());
  osc.start(time); osc.stop(time + dur);
}

function playBass(freq, time, dur, vol) {
  const ctx = state.audioCtx;
  const v = vol * state.volume;
  const osc = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sawtooth'; osc.frequency.value = freq;
  osc2.type = 'square'; osc2.frequency.value = freq;
  const f = ctx.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 600; f.Q.value = 8;
  g.gain.setValueAtTime(v * 0.2, time);
  g.gain.setValueAtTime(v * 0.2, time + dur * 0.7);
  g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.95);
  osc.connect(f); osc2.connect(f); f.connect(g); g.connect(getMusicDest());
  osc.start(time); osc.stop(time + dur);
  osc2.start(time); osc2.stop(time + dur);
}

// Shuffle music queue for random mode
function shuffleMusicQueue() {
  const styles = ['funk', 'hiphop', 'classical', 'jazz', 'lofi', 'edm', 'reggae', 'bossa'];
  for (let i = styles.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [styles[i], styles[j]] = [styles[j], styles[i]];
  }
  state.musicQueue = styles;
  state.musicQueueIdx = 0;
}

// Background music using Web Audio API - with variation & progression
function startMusic() {
  stopMusic();
  if (state.musicType === 'none' || !state.audioCtx) return;

  // Resolve actual music style for random mode
  let activeStyle = state.musicType;
  if (state.musicType === 'random') {
    if (state.musicQueue.length === 0) shuffleMusicQueue();
    activeStyle = state.musicQueue[state.musicQueueIdx % state.musicQueue.length];
  }

  createMusicBus();
  state.musicLoopCount = 0;
  state.musicStartTime = state.audioCtx.currentTime;

  const bpm = activeStyle === 'hiphop' ? 90 : activeStyle === 'reggae' ? 80 : activeStyle === 'lofi' ? 75 : activeStyle === 'bossa' ? 130 : 128;
  const beatDur = 60 / bpm;
  const barDur = beatDur * 4;

  // Helper: get progression phase (0=intro, 1=build, 2=peak, 3=outro)
  function getPhase() {
    const elapsed = state.audioCtx.currentTime - state.musicStartTime;
    const total = TOTAL_SECONDS;
    const ratio = Math.min(elapsed / total, 1);
    if (ratio < 0.2) return 0;
    if (ratio < 0.5) return 1;
    if (ratio < 0.85) return 2;
    return 3;
  }

  // Helper: pick from array based on loop count for variety
  function pick(arr, offset) {
    return arr[(state.musicLoopCount + (offset || 0)) % arr.length];
  }

  if (activeStyle === 'funk') {
    // Synth Pop: 120 BPM, soft synth pads, gentle arpeggios, light kicks
    const spBpm = 120;
    const spBeat = 60 / spBpm;
    const spBar = spBeat * 4;
    const dest = getMusicDest();
    const ctx = state.audioCtx;

    const chordSets = [
      [[262,330,392,494],[294,370,440,523],[349,440,523,659],[330,415,494,622]],
      [[262,330,392,494],[220,277,330,415],[247,311,370,466],[262,330,392,494]],
    ];
    const melodies = [
      [{f:659,t:0,d:0.75},{f:587,t:1,d:0.5},{f:523,t:1.5,d:0.75},{f:587,t:2.5,d:0.5},{f:659,t:3,d:1}],
      [{f:523,t:0,d:0.5},{f:587,t:0.75,d:0.5},{f:659,t:1.5,d:1},{f:523,t:2.5,d:0.5},{f:494,t:3,d:0.75}],
      [{f:784,t:0,d:0.5},{f:659,t:0.5,d:0.5},{f:587,t:1.5,d:0.75},{f:523,t:2.5,d:1}],
      [{f:494,t:0,d:0.75},{f:523,t:1,d:0.5},{f:659,t:2,d:0.75},{f:587,t:3,d:0.75}],
    ];
    const bassNotes = [
      [{f:65.4,t:0,d:1.5},{f:73.4,t:2,d:1.5}],
      [{f:55,t:0,d:1.5},{f:65.4,t:2,d:1.5}],
      [{f:73.4,t:0,d:1},{f:65.4,t:1.5,d:1},{f:55,t:3,d:0.75}],
    ];

    function playSoftPad(freq, time, dur, vol) {
      const o = ctx.createOscillator();
      const o2 = ctx.createOscillator();
      const g = ctx.createGain();
      const f = ctx.createBiquadFilter();
      o.type = 'sine'; o.frequency.value = freq;
      o2.type = 'triangle'; o2.frequency.value = freq * 1.002; // slight detune for warmth
      f.type = 'lowpass'; f.frequency.value = 1200;
      const v = state.volume * vol * 0.06;
      g.gain.setValueAtTime(0.001, time);
      g.gain.linearRampToValueAtTime(v, time + dur * 0.15);
      g.gain.setValueAtTime(v, time + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.98);
      o.connect(f); o2.connect(f); f.connect(g); g.connect(dest);
      o.start(time); o.stop(time + dur);
      o2.start(time); o2.stop(time + dur);
    }

    function synthPopLoop() {
      if (!state.running) return;
      const t = ctx.currentTime + 0.05;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * spBar;
        const chords = pick(chordSets, 0);
        const chord = chords[bar % chords.length];

        // Soft pad chords
        chord.forEach(freq => {
          playSoftPad(freq * 0.5, bt, spBar * 0.95, 0.7 + phase * 0.05);
        });

        // Light kick on 1 and 3
        playDrum('kick', bt, 0.35);
        playDrum('kick', bt + spBeat * 2, 0.3);
        // Soft clap on 2 and 4
        if (phase >= 1) {
          playDrum('clap', bt + spBeat, 0.15);
          playDrum('clap', bt + spBeat * 3, 0.15);
        }
        // Hi-hat with gentle swing
        for (let i = 0; i < 4; i++) {
          playDrum('hihat', bt + i * spBeat, 0.12);
          if (phase >= 1) playDrum('hihat', bt + (i + 0.5) * spBeat, 0.06);
        }

        // Arpeggio pattern
        const arpPattern = [0, 2, 1, 3, 0, 3, 1, 2];
        for (let i = 0; i < 8; i++) {
          const nt = bt + i * spBeat * 0.5;
          const freq = chord[arpPattern[i] % chord.length];
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.value = freq;
          const av = state.volume * 0.04 * (phase >= 2 ? 1.2 : 1);
          g.gain.setValueAtTime(av, nt);
          g.gain.exponentialRampToValueAtTime(0.001, nt + spBeat * 0.45);
          o.connect(g); g.connect(dest);
          o.start(nt); o.stop(nt + spBeat * 0.5);
        }

        // Melody in build/peak
        if (phase >= 1 && bar % 2 === 0) {
          const mel = pick(melodies, bar);
          mel.forEach(n => {
            playSoftPad(n.f, bt + n.t * spBeat, n.d * spBeat, 0.9);
          });
        }

        // Sub bass
        const bass = pick(bassNotes, bar);
        bass.forEach(n => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.type = 'sine';
          o.frequency.value = n.f;
          const bv = state.volume * 0.12;
          g.gain.setValueAtTime(bv, bt + n.t * spBeat);
          g.gain.setValueAtTime(bv, bt + n.t * spBeat + n.d * spBeat * 0.7);
          g.gain.exponentialRampToValueAtTime(0.001, bt + n.t * spBeat + n.d * spBeat * 0.95);
          o.connect(g); g.connect(dest);
          o.start(bt + n.t * spBeat); o.stop(bt + (n.t + n.d) * spBeat);
        });
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(synthPopLoop, spBar * (getPhase() >= 2 ? 4 : 2) * 1000 - 50);
    }
    synthPopLoop();

  } else if (activeStyle === 'hiphop') {
    // Hip-hop with rotating drum patterns, melody variations, progressive 808
    const drumPatterns = [
      (bt) => { // Boom bap
        playDrum('kick',bt,1.2); playDrum('kick',bt+beatDur*0.75,0.6); playDrum('kick',bt+beatDur*2,1); playDrum('kick',bt+beatDur*3.25,0.7);
        playDrum('snare',bt+beatDur,1); playDrum('snare',bt+beatDur*3,1);
      },
      (bt) => { // Trap-ish
        playDrum('kick',bt,1.2); playDrum('kick',bt+beatDur*1.75,0.8); playDrum('kick',bt+beatDur*2.5,1);
        playDrum('snare',bt+beatDur,1); playDrum('snare',bt+beatDur*3,1); playDrum('clap',bt+beatDur*3,0.7);
      },
      (bt) => { // Sparse
        playDrum('kick',bt,1.2); playDrum('kick',bt+beatDur*2.5,0.9);
        playDrum('snare',bt+beatDur,1); playDrum('snare',bt+beatDur*3,1); playDrum('snare',bt+beatDur*3.5,0.5);
      },
    ];
    const melodies = [
      [{f:311,t:0,d:0.5},{f:370,t:1,d:0.3},{f:415,t:2,d:0.5},{f:370,t:3,d:0.3}],
      [{f:415,t:0,d:0.4},{f:370,t:0.75,d:0.3},{f:311,t:1.5,d:0.5},{f:370,t:2.5,d:0.4},{f:415,t:3.5,d:0.3}],
      [{f:466,t:0,d:0.6},{f:415,t:1,d:0.4},{f:370,t:2,d:0.6},{f:311,t:3,d:0.4}],
      [{f:311,t:0.5,d:0.3},{f:415,t:1.25,d:0.5},{f:370,t:2.5,d:0.3},{f:466,t:3,d:0.5}],
    ];
    const bassFreqs = [55, 49, 58, 52];

    function hiphopLoop() {
      if (!state.running) return;
      const t = state.audioCtx.currentTime + 0.05;
      const phase = getPhase();
      const ctx = state.audioCtx;

      for (let bar = 0; bar < 2; bar++) {
        const bt = t + bar * barDur;
        // Rotating drum pattern
        pick(drumPatterns, bar)(bt);
        // Hihat pattern with variation
        const hihatDensity = phase >= 2 ? 16 : (phase >= 1 ? 12 : 8);
        for (let i = 0; i < hihatDensity; i++) {
          const ht = bt + i * (barDur / hihatDensity);
          const isRoll = phase >= 1 && ((i >= 4 && i <= 6) || (i >= hihatDensity-3));
          if (isRoll) {
            playDrum('hihat', ht, 0.35); playDrum('hihat', ht + beatDur * 0.125, 0.25);
          } else {
            playDrum('hihat', ht, 0.4 + Math.random() * 0.1);
          }
        }
        if (phase >= 1) playDrum('openhat', bt + beatDur * 1.75, 0.5);
        // 808 bass with varying root
        const bassRoot = pick(bassFreqs, bar);
        const osc = ctx.createOscillator(); const g = ctx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(bassRoot, bt);
        osc.frequency.exponentialRampToValueAtTime(bassRoot * 0.8, bt + barDur * 0.8);
        g.gain.setValueAtTime(state.volume * 0.35, bt);
        g.gain.setValueAtTime(state.volume * 0.35, bt + barDur * 0.6);
        g.gain.exponentialRampToValueAtTime(0.001, bt + barDur * 0.9);
        osc.connect(g); g.connect(getMusicDest());
        osc.start(bt); osc.stop(bt + barDur);
        // Rotating melody
        const mel = pick(melodies, bar);
        const synthType = phase >= 2 ? 'sawtooth' : 'square';
        mel.forEach(n => {
          playSynth(n.f, bt + n.t * beatDur, n.d * beatDur, synthType, 0.35 + phase * 0.05, 5);
        });
        // Add pad in peak phase
        if (phase >= 2 && bar === 0) {
          [185, 233, 277].forEach(f => {
            playSynth(f, bt, barDur * 1.5, 'sine', 0.15, 0);
          });
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(hiphopLoop, barDur * 2 * 1000 - 50);
    }
    hiphopLoop();

  } else if (activeStyle === 'classical') {
    // Classical: piano-like tones, string pads, waltz/orchestral feel
    const cbpm = 100;
    const cbeatDur = 60 / cbpm;
    const cbarDur = cbeatDur * 4;

    // Multiple classical melodies (piano-like, using sine+triangle)
    const cMelodies = [
      // Melody A - flowing ascending
      [{f:523,t:0,d:0.8},{f:587,t:0.5,d:0.4},{f:659,t:1,d:0.8},{f:698,t:1.5,d:0.4},
       {f:784,t:2,d:0.8},{f:698,t:2.5,d:0.4},{f:659,t:3,d:0.6},{f:587,t:3.5,d:0.4}],
      // Melody B - descending grace
      [{f:784,t:0,d:0.6},{f:698,t:0.5,d:0.4},{f:659,t:1,d:0.6},{f:587,t:1.5,d:0.4},
       {f:523,t:2,d:0.8},{f:494,t:2.5,d:0.4},{f:523,t:3,d:0.8},{f:587,t:3.5,d:0.3}],
      // Melody C - playful
      [{f:659,t:0,d:0.4},{f:784,t:0.5,d:0.4},{f:659,t:1,d:0.4},{f:523,t:1.5,d:0.6},
       {f:587,t:2,d:0.4},{f:698,t:2.5,d:0.4},{f:587,t:3,d:0.4},{f:523,t:3.5,d:0.6}],
      // Melody D - gentle arc
      [{f:440,t:0,d:0.6},{f:523,t:0.75,d:0.5},{f:659,t:1.5,d:0.6},{f:784,t:2,d:0.8},
       {f:659,t:2.75,d:0.4},{f:587,t:3.25,d:0.5},{f:523,t:3.75,d:0.3}],
    ];
    // Bass/chord patterns (arpeggiated chords)
    const cChords = [
      [[262,330,392],[247,311,370],[262,330,392],[294,349,440]], // C-B-C-Dm
      [[262,330,392],[349,440,523],[294,370,440],[262,330,392]], // C-F-Dm-C
      [[349,440,523],[330,415,494],[294,370,440],[262,330,392]], // F-E-Dm-C
    ];

    function playClassicalNote(freq, time, dur, vol) {
      const ctx = state.audioCtx;
      const v = vol * state.volume;
      // Sine + triangle for piano-like tone
      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const g = ctx.createGain();
      osc1.type = 'sine'; osc1.frequency.value = freq;
      osc2.type = 'triangle'; osc2.frequency.value = freq * 2; // octave harmonic
      const gOsc2 = ctx.createGain();
      gOsc2.gain.value = 0.15; // subtle harmonic
      // Attack-decay-sustain-release envelope
      g.gain.setValueAtTime(0.001, time);
      g.gain.exponentialRampToValueAtTime(v * 0.18, time + 0.02);
      g.gain.setValueAtTime(v * 0.14, time + 0.06);
      g.gain.setValueAtTime(v * 0.12, time + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.001, time + dur * 0.98);
      osc1.connect(g);
      osc2.connect(gOsc2); gOsc2.connect(g);
      g.connect(getMusicDest());
      osc1.start(time); osc1.stop(time + dur);
      osc2.start(time); osc2.stop(time + dur);
    }

    function classicalLoop() {
      if (!state.running) return;
      const ctx = state.audioCtx;
      const t = ctx.currentTime + 0.05;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * cbarDur;
        // Melody
        const mel = pick(cMelodies, bar);
        mel.forEach(n => {
          playClassicalNote(n.f, bt + n.t * cbeatDur, n.d * cbeatDur, 0.8 + phase * 0.05);
        });
        // Arpeggiated chord accompaniment
        const chordSet = pick(cChords, bar);
        const chord = chordSet[bar % chordSet.length];
        // Arpeggio pattern
        chord.forEach((f, ci) => {
          const arpTime = bt + ci * cbeatDur * 0.33;
          playClassicalNote(f * 0.5, arpTime, cbeatDur * 0.8, 0.5);
        });
        // Reverse arpeggio on beats 2-3
        if (phase >= 1) {
          [...chord].reverse().forEach((f, ci) => {
            playClassicalNote(f * 0.5, bt + cbeatDur * 2 + ci * cbeatDur * 0.33, cbeatDur * 0.7, 0.4);
          });
        }
        // String pad in build/peak phases
        if (phase >= 1 && bar % 2 === 0) {
          chord.forEach(f => {
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = f * 0.25; // low register
            const padVol = state.volume * (phase >= 2 ? 0.06 : 0.035);
            g.gain.setValueAtTime(0.001, bt);
            g.gain.linearRampToValueAtTime(padVol, bt + cbarDur * 0.3);
            g.gain.setValueAtTime(padVol, bt + cbarDur * 1.5);
            g.gain.exponentialRampToValueAtTime(0.001, bt + cbarDur * 1.9);
            osc.connect(g); g.connect(getMusicDest());
            osc.start(bt); osc.stop(bt + cbarDur * 2);
          });
        }
        // Light percussion (soft ticks) in peak phase
        if (phase >= 2) {
          for (let i = 0; i < 4; i++) {
            const tickOsc = ctx.createOscillator();
            const tickG = ctx.createGain();
            tickOsc.type = 'sine';
            tickOsc.frequency.value = 4000;
            const tt = bt + i * cbeatDur;
            tickG.gain.setValueAtTime(state.volume * 0.015, tt);
            tickG.gain.exponentialRampToValueAtTime(0.001, tt + 0.03);
            tickOsc.connect(tickG); tickG.connect(getMusicDest());
            tickOsc.start(tt); tickOsc.stop(tt + 0.04);
          }
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(classicalLoop, cbarDur * loopBars * 1000 - 50);
    }
    classicalLoop();

  } else if (activeStyle === 'jazz') {
    // === JAZZ PIANO ===
    const jbpm = 120;
    const jbeatDur = 60 / jbpm;
    const jbarDur = jbeatDur * 4;
    const dest = getMusicDest();
    const ctx = state.audioCtx;

    // Jazz scales and chords (Cmaj7, Dm7, Em7, Fmaj7, G7, Am7)
    const jazzChords = [
      [261.6, 329.6, 392, 493.9],   // Cmaj7
      [293.7, 349.2, 440, 523.3],   // Dm7
      [329.6, 392, 493.9, 587.3],   // Em7
      [349.2, 440, 523.3, 659.3],   // Fmaj7
      [392, 493.9, 587.3, 698.5],   // G7
      [440, 523.3, 659.3, 784],     // Am7
    ];
    // Walking bass patterns (root notes)
    const jazzBassLines = [
      [130.8, 146.8, 164.8, 174.6],
      [146.8, 164.8, 174.6, 196],
      [174.6, 196, 220, 246.9],
    ];
    // Melody phrases
    const jazzMelodies = [
      [{f:523.3,t:0,d:0.8},{f:587.3,t:1,d:0.5},{f:659.3,t:1.5,d:1},{f:587.3,t:2.5,d:0.5},{f:523.3,t:3,d:1}],
      [{f:659.3,t:0,d:0.5},{f:698.5,t:0.5,d:0.5},{f:784,t:1,d:1.5},{f:659.3,t:2.5,d:0.5},{f:587.3,t:3,d:0.8}],
      [{f:784,t:0,d:1},{f:698.5,t:1.5,d:0.5},{f:659.3,t:2,d:0.5},{f:587.3,t:2.5,d:0.5},{f:523.3,t:3,d:1}],
      [{f:440,t:0,d:0.5},{f:523.3,t:0.5,d:1},{f:587.3,t:2,d:0.5},{f:659.3,t:2.5,d:1.5}],
    ];

    function playJazzPiano(freq, time, dur, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = freq;
      const v = state.volume * vol * 0.12;
      g.gain.setValueAtTime(v, time);
      g.gain.exponentialRampToValueAtTime(v * 0.6, time + dur * 0.3);
      g.gain.exponentialRampToValueAtTime(0.001, time + dur);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + dur + 0.01);
    }

    function playBrushHit(time, vol) {
      // Brushed cymbal sound using noise-like high freq
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = 6000 + Math.random() * 2000;
      const v = state.volume * vol * 0.02;
      g.gain.setValueAtTime(v, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.08);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + 0.1);
    }

    function jazzLoop() {
      if (!state.running) return;
      const t = ctx.currentTime + 0.05;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * jbarDur;
        const chord = pick(jazzChords, bar);

        // Comping: stab chords on off-beats
        const compBeats = phase >= 1 ? [0.5, 1.5, 2.5, 3.5] : [1, 3];
        compBeats.forEach(b => {
          if (Math.random() > 0.3) {
            chord.forEach(f => {
              playJazzPiano(f, bt + b * jbeatDur, jbeatDur * 0.6, 0.5 + phase * 0.08);
            });
          }
        });

        // Walking bass
        const bassLine = pick(jazzBassLines, bar);
        for (let i = 0; i < 4; i++) {
          const bo = ctx.createOscillator();
          const bg = ctx.createGain();
          bo.type = 'sine';
          bo.frequency.value = bassLine[i % bassLine.length];
          const bv = state.volume * 0.15;
          bg.gain.setValueAtTime(bv, bt + i * jbeatDur);
          bg.gain.exponentialRampToValueAtTime(0.001, bt + (i + 0.9) * jbeatDur);
          bo.connect(bg); bg.connect(dest);
          bo.start(bt + i * jbeatDur); bo.stop(bt + (i + 1) * jbeatDur);
        }

        // Brushed drums - ride pattern
        for (let i = 0; i < 4; i++) {
          playBrushHit(bt + i * jbeatDur, 0.6);
          if (phase >= 1) playBrushHit(bt + (i + 0.5) * jbeatDur, 0.3);
        }

        // Melody in build/peak
        if (phase >= 1 && bar % 2 === 0) {
          const mel = pick(jazzMelodies, bar);
          mel.forEach(n => {
            playJazzPiano(n.f, bt + n.t * jbeatDur, n.d * jbeatDur, 0.8 + phase * 0.05);
          });
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(jazzLoop, jbarDur * loopBars * 1000 - 50);
    }
    jazzLoop();

  } else if (activeStyle === 'lofi') {
    // === LO-FI BEATS ===
    const lbpm = 75;
    const lbeatDur = 60 / lbpm;
    const lbarDur = lbeatDur * 4;
    const dest = getMusicDest();
    const ctx = state.audioCtx;

    // Warm jazzy chords (minor 7ths, 9ths)
    const lofiChords = [
      [261.6, 311.1, 392, 466.2],   // Cm7
      [220, 261.6, 329.6, 415.3],   // Am7
      [233.1, 277.2, 349.2, 415.3], // Bbmaj7
      [196, 233.1, 293.7, 349.2],   // Gm7
    ];
    // Mellow melodies
    const lofiMelodies = [
      [{f:523.3,t:0,d:1.5},{f:466.2,t:2,d:1},{f:392,t:3,d:1}],
      [{f:392,t:0,d:1},{f:466.2,t:1.5,d:1},{f:523.3,t:3,d:1}],
      [{f:349.2,t:0,d:2},{f:392,t:2.5,d:1.5}],
      [{f:466.2,t:0,d:1},{f:440,t:1,d:0.5},{f:392,t:1.5,d:1},{f:349.2,t:3,d:1}],
    ];

    function playLofiTone(freq, time, dur, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      // Warm sine with slight detuning for vinyl feel
      o.type = 'sine';
      o.frequency.value = freq * (1 + (Math.random() - 0.5) * 0.003);
      const v = state.volume * vol * 0.1;
      g.gain.setValueAtTime(0.001, time);
      g.gain.linearRampToValueAtTime(v, time + 0.05);
      g.gain.setValueAtTime(v, time + dur * 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, time + dur);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + dur + 0.01);
    }

    function playLofiKick(time) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(120, time);
      o.frequency.exponentialRampToValueAtTime(50, time + 0.12);
      const v = state.volume * 0.2;
      g.gain.setValueAtTime(v, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + 0.3);
    }

    function playLofiSnare(time) {
      // Soft snare with noise character
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.value = 3500 + Math.random() * 500;
      const v = state.volume * 0.04;
      g.gain.setValueAtTime(v, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + 0.12);
    }

    function playLofiHat(time, vol) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.value = 8000 + Math.random() * 1000;
      const v = state.volume * vol * 0.015;
      g.gain.setValueAtTime(v, time);
      g.gain.exponentialRampToValueAtTime(0.001, time + 0.04);
      o.connect(g); g.connect(dest);
      o.start(time); o.stop(time + 0.05);
    }

    function lofiLoop() {
      if (!state.running) return;
      const t = ctx.currentTime + 0.05;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * lbarDur;
        const chord = pick(lofiChords, bar);

        // Warm chord pads
        chord.forEach(f => {
          playLofiTone(f * 0.5, bt, lbarDur * 0.95, 0.6 + phase * 0.05);
        });

        // Lazy drum pattern - kick on 1 and 3, snare on 2 and 4
        playLofiKick(bt);
        playLofiKick(bt + 2 * lbeatDur);
        playLofiSnare(bt + lbeatDur);
        if (phase >= 1) playLofiSnare(bt + 3 * lbeatDur);

        // Hi-hats with swing
        for (let i = 0; i < 4; i++) {
          playLofiHat(bt + i * lbeatDur, 0.8);
          if (phase >= 1 && Math.random() > 0.4) {
            playLofiHat(bt + (i + 0.66) * lbeatDur, 0.4); // swing feel
          }
        }

        // Melody - simple and dreamy
        if (bar % 2 === 0 || phase >= 2) {
          const mel = pick(lofiMelodies, bar);
          mel.forEach(n => {
            playLofiTone(n.f, bt + n.t * lbeatDur, n.d * lbeatDur, 0.7 + phase * 0.06);
          });
        }

        // Sub bass following chord root
        const sub = ctx.createOscillator();
        const sg = ctx.createGain();
        sub.type = 'sine';
        sub.frequency.value = chord[0] * 0.25;
        const sv = state.volume * 0.12;
        sg.gain.setValueAtTime(sv, bt);
        sg.gain.setValueAtTime(sv, bt + lbarDur * 0.7);
        sg.gain.exponentialRampToValueAtTime(0.001, bt + lbarDur * 0.95);
        sub.connect(sg); sg.connect(dest);
        sub.start(bt); sub.stop(bt + lbarDur);
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(lofiLoop, lbarDur * loopBars * 1000 - 50);
    }
    lofiLoop();

  } else if (activeStyle === 'edm') {
    // EDM - Electronic Dance Music: 128 BPM, four-on-the-floor, synth pads, filter sweeps
    const ebeatDur = beatDur;
    const ebarDur = barDur;
    const dest = getMusicDest();

    const bassPatterns = [
      [{f:55,t:0,d:0.5},{f:55,t:1,d:0.25},{f:55,t:2,d:0.5},{f:55,t:3.5,d:0.25}],
      [{f:49,t:0,d:0.5},{f:49,t:1.5,d:0.25},{f:49,t:2,d:0.5},{f:49,t:3,d:0.25}],
      [{f:62,t:0,d:0.75},{f:55,t:2,d:0.75},{f:49,t:3,d:0.5}],
    ];
    const leadMelodies = [
      [{f:523,t:0,d:0.5},{f:587,t:0.5,d:0.5},{f:659,t:1,d:1},{f:523,t:2.5,d:0.5},{f:494,t:3,d:0.5}],
      [{f:659,t:0,d:0.75},{f:587,t:1,d:0.5},{f:523,t:2,d:0.75},{f:494,t:3,d:0.5}],
      [{f:784,t:0,d:0.5},{f:659,t:0.5,d:0.5},{f:523,t:1,d:0.5},{f:659,t:2,d:1.5}],
      [{f:523,t:0,d:0.25},{f:523,t:0.5,d:0.25},{f:659,t:1,d:0.5},{f:784,t:2,d:0.5},{f:659,t:3,d:0.5}],
    ];
    const chordSets = [
      [[262,330,392],[294,370,440],[262,330,392],[247,311,370]],
      [[262,330,392],[349,440,523],[294,370,440],[262,330,392]],
    ];

    function edmLoop() {
      if (!state.running) return;
      const t = state.audioCtx.currentTime;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * ebarDur;

        // Four-on-the-floor kick
        for (let b = 0; b < 4; b++) {
          const kt = bt + b * ebeatDur;
          playDrum('kick', kt, 0.7);
        }
        // Off-beat hi-hats
        for (let b = 0; b < 4; b++) {
          playDrum('hat', bt + b * ebeatDur + ebeatDur * 0.5, 0.3);
        }
        // Clap on 2 and 4
        playDrum('snare', bt + ebeatDur, 0.4);
        playDrum('snare', bt + ebeatDur * 3, 0.4);

        // Synth pad chords
        if (phase >= 1) {
          const chords = pick(chordSets, 0);
          const chord = chords[bar % chords.length];
          chord.forEach(f => {
            const o = state.audioCtx.createOscillator();
            const g = state.audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.value = f;
            g.gain.setValueAtTime(state.volume * 0.03, bt);
            g.gain.exponentialRampToValueAtTime(0.001, bt + ebarDur * 0.9);
            // Filter sweep effect
            const filter = state.audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(400, bt);
            filter.frequency.linearRampToValueAtTime(phase >= 2 ? 3000 : 1500, bt + ebarDur * 0.6);
            filter.frequency.linearRampToValueAtTime(400, bt + ebarDur * 0.9);
            o.connect(filter); filter.connect(g); g.connect(dest);
            o.start(bt); o.stop(bt + ebarDur);
          });
        }

        // Bass
        const bass = pick(bassPatterns, bar);
        bass.forEach(n => {
          playBass(n.f, bt + n.t * ebeatDur, n.d * ebeatDur, state.volume * 0.12);
        });

        // Lead synth melody
        if (phase >= 1) {
          const melody = pick(leadMelodies, bar);
          melody.forEach(n => {
            playSynth(n.f, bt + n.t * ebeatDur, n.d * ebeatDur, 'square', state.volume * 0.04, 5);
          });
        }

        // Extra hi-hat rolls in peak phase
        if (phase >= 2 && bar % 2 === 1) {
          for (let i = 0; i < 8; i++) {
            playDrum('hat', bt + i * ebeatDur * 0.5, 0.2);
          }
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(edmLoop, ebarDur * loopBars * 1000 - 50);
    }
    edmLoop();

  } else if (activeStyle === 'reggae') {
    // Reggae: 80 BPM, off-beat skank, deep bass, one-drop rhythm
    const rbpm = 80;
    const rbeatDur = 60 / rbpm;
    const rbarDur = rbeatDur * 4;
    const dest = getMusicDest();

    const bassLines = [
      [{f:55,t:0,d:1},{f:55,t:2,d:0.5},{f:62,t:2.5,d:0.5},{f:49,t:3,d:0.75}],
      [{f:49,t:0,d:1.5},{f:55,t:2,d:0.75},{f:62,t:3,d:0.5}],
      [{f:55,t:0,d:0.75},{f:49,t:1,d:0.75},{f:44,t:2,d:0.75},{f:55,t:3,d:0.75}],
    ];
    const skankChords = [
      [[262,330,392],[247,311,370],[262,330,392],[294,370,440]],
      [[220,277,330],[247,311,370],[262,330,392],[262,330,392]],
    ];
    const melodies = [
      [{f:523,t:0,d:0.5},{f:494,t:1,d:0.5},{f:440,t:2,d:1},{f:392,t:3.5,d:0.5}],
      [{f:392,t:0,d:0.75},{f:440,t:1,d:0.5},{f:523,t:2,d:1}],
      [{f:659,t:0,d:0.5},{f:523,t:0.5,d:0.5},{f:494,t:1.5,d:0.5},{f:440,t:2.5,d:1}],
    ];

    function reggaeLoop() {
      if (!state.running) return;
      const t = state.audioCtx.currentTime;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * rbarDur;

        // One-drop: kick on beat 3, snare on beat 3
        playDrum('kick', bt + rbeatDur * 2, 0.6);
        playDrum('snare', bt + rbeatDur * 2, 0.3);
        // Rimshot on beat 4
        playDrum('hat', bt + rbeatDur * 3, 0.4);
        // Light hi-hat
        for (let b = 0; b < 4; b++) {
          playDrum('hat', bt + b * rbeatDur, 0.15);
        }

        // Off-beat skank (guitar-like chords on the "and")
        const chords = pick(skankChords, 0);
        const chord = chords[bar % chords.length];
        for (let b = 0; b < 4; b++) {
          const st = bt + b * rbeatDur + rbeatDur * 0.5;
          chord.forEach(f => {
            const o = state.audioCtx.createOscillator();
            const g = state.audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.value = f;
            const sv = state.volume * 0.04;
            g.gain.setValueAtTime(sv, st);
            g.gain.exponentialRampToValueAtTime(0.001, st + rbeatDur * 0.4);
            o.connect(g); g.connect(dest);
            o.start(st); o.stop(st + rbeatDur * 0.45);
          });
        }

        // Deep bass
        const bass = pick(bassLines, bar);
        bass.forEach(n => {
          playBass(n.f, bt + n.t * rbeatDur, n.d * rbeatDur, state.volume * 0.15);
        });

        // Melody (phase >= 1)
        if (phase >= 1 && bar % 2 === 0) {
          const mel = pick(melodies, bar);
          mel.forEach(n => {
            playSynth(n.f, bt + n.t * rbeatDur, n.d * rbeatDur, 'sine', state.volume * 0.05);
          });
        }

        // Extra percussion in peak
        if (phase >= 2) {
          playDrum('hat', bt + rbeatDur * 0.5, 0.2);
          playDrum('hat', bt + rbeatDur * 1.5, 0.2);
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(reggaeLoop, rbarDur * loopBars * 1000 - 50);
    }
    reggaeLoop();

  } else if (activeStyle === 'bossa') {
    // Bossa Nova: 130 BPM, nylon guitar feel, gentle percussion, Brazilian rhythm
    const bbpm = 130;
    const bbeatDur = 60 / bbpm;
    const bbarDur = bbeatDur * 4;
    const dest = getMusicDest();

    const chordSets = [
      [[262,330,392,494],[294,370,440,523],[349,440,523,659],[330,415,494,622]],
      [[262,330,392,494],[220,277,330,415],[247,311,370,466],[262,330,392,494]],
      [[349,440,523,659],[330,415,494,622],[294,370,440,523],[262,330,392,494]],
    ];
    const melodies = [
      [{f:659,t:0,d:0.5},{f:622,t:0.75,d:0.5},{f:659,t:1.5,d:0.75},{f:523,t:2.5,d:1}],
      [{f:523,t:0,d:0.75},{f:494,t:1,d:0.5},{f:440,t:1.75,d:0.5},{f:392,t:2.5,d:1}],
      [{f:784,t:0,d:0.5},{f:659,t:0.75,d:0.5},{f:523,t:1.5,d:0.5},{f:659,t:2.5,d:1}],
      [{f:440,t:0,d:0.5},{f:523,t:0.5,d:0.5},{f:659,t:1.5,d:0.75},{f:523,t:2.5,d:0.75}],
    ];
    const bassNotes = [
      [{f:131,t:0,d:1},{f:147,t:2,d:1}],
      [{f:110,t:0,d:1},{f:131,t:2,d:1}],
      [{f:147,t:0,d:1},{f:131,t:2,d:1}],
    ];

    function bossaLoop() {
      if (!state.running) return;
      const t = state.audioCtx.currentTime;
      const phase = getPhase();
      const loopBars = phase >= 2 ? 4 : 2;

      for (let bar = 0; bar < loopBars; bar++) {
        const bt = t + bar * bbarDur;

        // Bossa nova rhythm: characteristic pattern
        // Beat pattern: x.x.xx.x (syncopated)
        const bossaPattern = [0, 0.75, 1.5, 2, 2.5, 3.25];
        const chords = pick(chordSets, 0);
        const chord = chords[bar % chords.length];

        // Nylon guitar-style arpeggiated chords
        bossaPattern.forEach((pos, idx) => {
          const nt = bt + pos * bbeatDur;
          const noteIdx = idx % chord.length;
          const o = state.audioCtx.createOscillator();
          const g = state.audioCtx.createGain();
          o.type = 'triangle';
          o.frequency.value = chord[noteIdx];
          const sv = state.volume * 0.05;
          g.gain.setValueAtTime(sv, nt);
          g.gain.setValueAtTime(sv, nt + bbeatDur * 0.3);
          g.gain.exponentialRampToValueAtTime(0.001, nt + bbeatDur * 0.6);
          o.connect(g); g.connect(dest);
          o.start(nt); o.stop(nt + bbeatDur * 0.65);
        });

        // Gentle percussion - surdo-like kick
        playDrum('kick', bt, 0.3);
        playDrum('kick', bt + bbeatDur * 2, 0.25);
        // Shaker/hi-hat pattern
        for (let b = 0; b < 8; b++) {
          playDrum('hat', bt + b * bbeatDur * 0.5, 0.1 + (b % 2 === 0 ? 0.05 : 0));
        }
        // Rim click
        if (phase >= 1) {
          playDrum('snare', bt + bbeatDur * 1, 0.15);
          playDrum('snare', bt + bbeatDur * 3, 0.15);
        }

        // Bass
        const bass = pick(bassNotes, bar);
        bass.forEach(n => {
          playBass(n.f, bt + n.t * bbeatDur, n.d * bbeatDur, state.volume * 0.1);
        });

        // Melody (phase >= 1)
        if (phase >= 1 && bar % 2 === 0) {
          const mel = pick(melodies, bar);
          mel.forEach(n => {
            playSynth(n.f, bt + n.t * bbeatDur, n.d * bbeatDur, 'sine', state.volume * 0.04);
          });
        }

        // Extra harmony layer in peak
        if (phase >= 2 && bar % 2 === 1) {
          chord.forEach(f => {
            const o = state.audioCtx.createOscillator();
            const g = state.audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = f * 0.5;
            g.gain.setValueAtTime(state.volume * 0.02, bt);
            g.gain.exponentialRampToValueAtTime(0.001, bt + bbarDur * 0.9);
            o.connect(g); g.connect(dest);
            o.start(bt); o.stop(bt + bbarDur);
          });
        }
      }
      state.musicLoopCount++;
      state.melodyTimeout = setTimeout(bossaLoop, bbarDur * loopBars * 1000 - 50);
    }
    bossaLoop();
  }
}

function stopMusic() {
  // Instantly silence all music by disconnecting the bus
  if (state.musicGain) {
    try { state.musicGain.disconnect(); } catch(e) {}
    state.musicGain = null;
  }
  state.musicNodes = [];
  if (state.melodyTimeout) {
    clearTimeout(state.melodyTimeout);
    state.melodyTimeout = null;
  }
}

// ============ TIMER ============
function formatTime(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function updateDisplay() {
  document.getElementById('mainTimer').textContent = formatTime(state.totalTimeLeft);

  // Clear all zone highlights first
  ZONE_IDS.forEach(id => document.getElementById(id).setAttribute('fill', 'transparent'));

  for (let i = 0; i < 6; i++) {
    const cell = document.getElementById(`zoneCell-${i}`);
    const timeEl = document.getElementById(`zoneTime-${i}`);
    const progressEl = document.getElementById(`zoneProgress-${i}`);
    const zIdx = zoneSequence[i]; // mapped zone index
    const zoneEl = document.getElementById(ZONE_IDS[zIdx]);

    cell.classList.remove('active', 'done');

    const isDone = i < state.currentZone || (i === state.currentZone && state.inGap);
    const isActive = i === state.currentZone && state.running && !state.inGap;
    const isNext = state.inGap && i === state.currentZone + 1;

    if (isDone) {
      cell.classList.add('done');
      timeEl.textContent = '0:00';
      progressEl.style.width = '100%';
      zoneEl.setAttribute('fill', 'rgba(102, 187, 106, 0.3)');
    } else if (isActive) {
      cell.classList.add('active');
      timeEl.textContent = formatTime(state.zoneTimeLeft);
      progressEl.style.width = `${((ZONE_SECONDS - state.zoneTimeLeft) / ZONE_SECONDS) * 100}%`;
      zoneEl.setAttribute('fill', 'rgba(79, 195, 247, 0.4)');
    } else if (isNext) {
      cell.classList.add('active');
      timeEl.textContent = formatTime(ZONE_SECONDS);
      progressEl.style.width = '0%';
      zoneEl.setAttribute('fill', 'rgba(255, 193, 7, 0.3)');
    } else {
      timeEl.textContent = formatTime(ZONE_SECONDS);
      progressEl.style.width = '0%';
    }
  }

  // Update label using zoneSequence
  if (state.running) {
    const curZIdx = zoneSequence[state.currentZone];
    if (state.inGap && state.currentZone + 1 < 6) {
      const nextZIdx = zoneSequence[state.currentZone + 1];
      document.getElementById('timerLabel').textContent = `准备换区 → ${ZONE_NAMES[nextZIdx]}`;
    } else {
      document.getElementById('timerLabel').textContent = `正在刷：${ZONE_NAMES[curZIdx]}区域`;
    }
  }
}

function startBrushing() {
  initAudio();
  // Set zone sequence
  if (zoneOrder === 'random') {
    zoneSequence = [0, 1, 2, 3, 4, 5];
    for (let i = zoneSequence.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [zoneSequence[i], zoneSequence[j]] = [zoneSequence[j], zoneSequence[i]];
    }
  } else {
    zoneSequence = [0, 1, 2, 3, 4, 5];
  }
  state.running = true;
  state.currentZone = 0;
  state.zoneTimeLeft = ZONE_SECONDS;
  state.totalTimeLeft = TOTAL_SECONDS;

  // Update zone cell labels to match sequence
  for (let i = 0; i < 6; i++) {
    const zIdx = zoneSequence[i];
    document.querySelector(`#zoneCell-${i} .zone-name`).textContent = ZONE_NAMES[zIdx];
  }

  document.getElementById('toothContainer').classList.add('brushing');
  document.querySelector('.order-toggle').style.display = 'none';
  state.paused = false;
  document.getElementById('controls').innerHTML = `
    <button class="btn btn-pause" onclick="togglePause()" id="pauseBtn">暂停</button>
    <button class="btn btn-stop" onclick="stopBrushing()">放弃</button>
  `;
  document.getElementById('completion').classList.remove('show');

  if (state.musicType === 'random') shuffleMusicQueue();
  startMusic();
  speakZone(ZONE_NAMES[zoneSequence[0]] + '，开始');
  updateDisplay();

  state.inGap = false;
  state.gapTimeLeft = 0;
  state.interval = setInterval(() => {
    state.totalTimeLeft--;

    // During gap between zones
    if (state.inGap) {
      state.gapTimeLeft--;
      if (state.gapTimeLeft <= 0) {
        state.inGap = false;
        state.currentZone++;
        state.zoneTimeLeft = ZONE_SECONDS;
        // Switch music in random mode on zone change
        if (state.musicType === 'random') {
          state.musicQueueIdx++;
          startMusic();
        }
      }
      updateDisplay();
      updateToothFace();
      return;
    }

    state.zoneTimeLeft--;

    // Tick sound in last 5 seconds of each zone
    if (state.zoneTimeLeft <= 5 && state.zoneTimeLeft > 0) {
      playTick();
    }

    if (state.zoneTimeLeft <= 0) {
      if (state.currentZone < 5) {
        playZoneSwitch();
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        // Enter gap before next zone
        state.inGap = true;
        state.gapTimeLeft = ZONE_GAP;
        // Announce next zone during gap so user hears it before zone starts
        speakZone(ZONE_NAMES[zoneSequence[state.currentZone + 1]] + '，开始');
      } else {
        completeBrushing();
        return;
      }
    }

    updateDisplay();
    updateToothFace();
  }, 1000);
}

function togglePause() {
  if (!state.running) return;
  state.paused = !state.paused;
  const btn = document.getElementById('pauseBtn');
  if (state.paused) {
    clearInterval(state.interval);
    stopMusic();
    btn.textContent = '继续';
    document.getElementById('timerLabel').textContent = '已暂停';
    document.getElementById('toothContainer').classList.remove('brushing');
  } else {
    startMusic();
    document.getElementById('toothContainer').classList.add('brushing');
    btn.textContent = '暂停';
    // Restart the interval
    state.interval = setInterval(() => {
      state.totalTimeLeft--;
      if (state.inGap) {
        state.gapTimeLeft--;
        if (state.gapTimeLeft <= 0) {
          state.inGap = false;
          state.currentZone++;
          state.zoneTimeLeft = ZONE_SECONDS;
        }
        updateDisplay();
        updateToothFace();
        return;
      }
      state.zoneTimeLeft--;
      if (state.zoneTimeLeft <= 5 && state.zoneTimeLeft > 0) playTick();
      if (state.zoneTimeLeft <= 0) {
        if (state.currentZone < 5) {
          playZoneSwitch();
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          state.inGap = true;
          state.gapTimeLeft = ZONE_GAP;
          speakZone(ZONE_NAMES[zoneSequence[state.currentZone + 1]] + '，开始');
        } else {
          completeBrushing();
          return;
        }
      }
      updateDisplay();
      updateToothFace();
    }, 1000);
  }
}

function stopBrushing() {
  state.running = false;
  clearInterval(state.interval);
  stopMusic();
  document.getElementById('toothContainer').classList.remove('brushing');
  resetTimerUI();
}

function completeBrushing() {
  state.running = false;
  clearInterval(state.interval);
  stopMusic();
  playComplete();
  speakZone('刷牙完成啦！好棒好棒！');
  if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 400]);

  document.getElementById('toothContainer').classList.remove('brushing');

  // Save record
  saveRecord(todayStr());
  const streak = getStreak();

  // Show completion
  document.getElementById('controls').style.display = 'none';
  document.getElementById('zoneMap').style.display = 'none';
  document.getElementById('mainTimer').style.display = 'none';
  document.getElementById('timerLabel').style.display = 'none';
  document.getElementById('toothContainer').style.display = 'none';
  document.querySelector('.music-selector').style.display = 'none';
  document.querySelector('.volume-control').style.display = 'none';

  const comp = document.getElementById('completion');
  comp.classList.add('show');
  document.getElementById('streakDisplay').textContent = streak;

  const msgs = [
    '牙齿亮晶晶~',
    '坚持就是胜利！',
    '牙宝今天很开心！',
    '口腔卫生达人！',
    '完美的两分钟！',
  ];
  document.getElementById('completionMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  updateCharacter();
}

function updateToothFace() {
  const progress = 1 - (state.totalTimeLeft / TOTAL_SECONDS);
  const mouth = document.getElementById('mouth');

  if (!state.running) {
    // Neutral/happy based on streak
    const streak = getStreak();
    if (streak === 0) {
      mouth.setAttribute('d', 'M88 108 L112 108'); // flat
      document.getElementById('toothBody').setAttribute('fill', '#e8e8e0');
    } else if (streak < 3) {
      mouth.setAttribute('d', 'M88 105 Q100 114 112 105');
      document.getElementById('toothBody').setAttribute('fill', '#f0f0ec');
    } else {
      mouth.setAttribute('d', 'M85 105 Q100 122 115 105');
      document.getElementById('toothBody').setAttribute('fill', '#f5f5f5');
    }
  } else {
    // During brushing: progressively happier
    if (progress < 0.33) {
      mouth.setAttribute('d', 'M90 105 Q100 112 110 105');
    } else if (progress < 0.66) {
      mouth.setAttribute('d', 'M88 105 Q100 116 112 105');
    } else {
      mouth.setAttribute('d', 'M85 103 Q100 124 115 103');
    }
  }
}

let calYear, calMonth;
{
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const records = getRecords();
  const today = todayStr();
  const title = `${calYear}年${calMonth + 1}月`;
  document.getElementById('calTitle').textContent = title;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Headers
  ['日', '一', '二', '三', '四', '五', '六'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-header';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    el.className = 'cal-day';
    if (records.includes(ds)) el.classList.add('checked');
    if (ds === today) el.classList.add('today');
    el.textContent = d;
    grid.appendChild(el);
  }

  // Stats
  const streak = getStreak();
  const monthCount = records.filter(r => r.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`)).length;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statMonth').textContent = monthCount;
  document.getElementById('statTotal').textContent = records.length;
}

function updateCharacter() {

  const streak = getStreak();

  // Find level
  let level = LEVELS[0];
  let levelIdx = 0;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (total >= LEVELS[i].min) {
      level = LEVELS[i];
      levelIdx = i;
      break;

  // Names evolve
  const names = ['小白牙', '亮白牙', '闪光牙', '钻石牙', '传说之牙', '永恒之牙', '神话之牙'];

  }
  // Sparkles
  if (eff === 'sparkle' || eff === 'diamond' || eff === 'rainbow') {
    extras += `<text x="145" y="50" font-size="16" fill="#FFD700">✦</text><text x="48" y="55" font-size="12" fill="#FFD700">✦</text>`;
  }

  return `<svg width="${s}" height="${Math.round(s*1.2)}" viewBox="0 0 200 240">
    <defs>${defs}</defs>
    ${extras}
    <path d="M60 80 Q60 30 100 30 Q140 30 140 80 L145 120 Q145 140 135 160 L125 200 Q120 220 110 220 Q105 215 100 200 Q95 215 90 220 Q80 220 75 200 L65 160 Q55 140 55 120 Z"
          fill="${fill}" stroke="#ccc" stroke-width="2"/>
    ${face.eyeL}
    ${face.eyeR}
    <path d="${face.mouth}" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="75" cy="100" rx="7" ry="4" fill="rgba(255,150,150,${face.blush})"/>
    <ellipse cx="125" cy="100" rx="7" ry="4" fill="rgba(255,150,150,${face.blush})"/>
  </svg>`;
}

function showLevelGuide() {
  const total = getRecords().length;
  const levelIdx = LEVELS.reduce((idx, lv, i) => total >= lv.min ? i : idx, 0);
  const nextLevel = levelIdx < LEVELS.length - 1 ? LEVELS[levelIdx + 1] : null;
  const effectLabels = { glow: '✨ 光环', sparkle: '👑 皇冠', diamond: '💎 翅膀', rainbow: '🌈 全套装备' };

  const body = document.getElementById('levelGuideBody');
  body.innerHTML = LEVELS.map((lv, i) => {
    const isDone = total >= lv.min && i !== levelIdx;
    const isCurrent = i === levelIdx;
    const cls = isCurrent ? 'current' : (isDone ? '' : (i > levelIdx ? 'locked' : ''));
    const daysNeeded = lv.min - total;
    let reqText, reqCls;
    if (isDone) {
      reqText = '✓ 已达成'; reqCls = 'done';
    } else if (isCurrent) {
      reqText = nextLevel ? `还需 ${nextLevel.min - total} 天升级` : '最高等级！'; reqCls = 'current';
    } else {
      reqText = `累计 ${lv.min} 天（还差 ${daysNeeded} 天）`; reqCls = 'locked';
    }
    const effectTag = lv.effect && lv.effect !== 'none' ? `<span style="font-size:11px;margin-left:4px;padding:1px 6px;border-radius:8px;background:rgba(255,215,0,0.15);color:#ffd700;">${effectLabels[lv.effect]}</span>` : '';

    return `<div class="level-card ${cls}">
      <div class="level-card-preview">${buildToothSVG(lv, 48)}</div>
      <div class="level-card-info">
        <div class="level-card-name">Lv.${i+1} ${lv.name}${effectTag}</div>
        <div class="level-card-title">${lv.title}</div>
        <span class="level-card-req ${reqCls}">${reqText}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('levelModal').style.display = 'flex';
}

function closeLevelGuide() {
  document.getElementById('levelModal').style.display = 'none';
}

// ============ NAVIGATION ============
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b => {
    if ((page === 'timer' && b.textContent.includes('刷牙')) ||
        (page === 'calendar' && b.textContent.includes('打卡')) ||
        (page === 'character' && b.textContent.includes('牙宝'))) {
      b.classList.add('active');
    }
  });

  if (page === 'calendar') renderCalendar();
  if (page === 'character') updateCharacter();
}

// ============ INIT ============
initFirebase();
updateAuthUI();
updateToothFace();
updateDisplay();
</script>
